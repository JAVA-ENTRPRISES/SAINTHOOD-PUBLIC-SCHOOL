<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Sainthood Public School, Jajpur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <div id="authpanel-placeholder"></div>

    <main class="page-wrap">
        <header class="page-banner">
            <div class="container">
                <p class="page-banner__eyebrow">Moments on campus</p>
                <h1 class="page-banner__title">Gallery</h1>
                <p class="page-banner__sub">
                    A visual diary of buildings, classrooms, events, and celebrations—swap images anytime as your own
                    photographs grow.
                </p>
            </div>
        </header>

        <div class="container">
            <section class="content-section pt-0">
                <div class="photo-masonry">
                    <figure>
                        <img src="assets/images/SCHOOL.jpg" alt="School campus" loading="lazy" />
                        <figcaption class="photo-masonry__cap">Campus facade</figcaption>
                    </figure>
                    <figure>
                        <img src="assets/images/CLASSROOM.jpg" alt="Classroom" loading="lazy" />
                        <figcaption class="photo-masonry__cap">Learning studios</figcaption>
                    </figure>
                    <figure>
                        <img src="assets/images/LABORATORY.jpg" alt="Laboratory" loading="lazy" />
                        <figcaption class="photo-masonry__cap">Laboratory</figcaption>
                    </figure>
                    <figure>
                        <img src="assets/images/SPORTS.jpg" alt="Sports" loading="lazy" />
                        <figcaption class="photo-masonry__cap">Sports afternoon</figcaption>
                    </figure>
                    <figure>
                        <img src="assets/images/ANNUAL DAY.jpg" alt="Annual day" loading="lazy" />
                        <figcaption class="photo-masonry__cap">Annual day</figcaption>
                    </figure>
                    <figure>
                        <img src="assets/images/LIBRARY.jpeg" alt="Library" loading="lazy" />
                        <figcaption class="photo-masonry__cap">Library</figcaption>
                    </figure>
                    <figure>
                        <img src="assets/images/SCIENCE-FAIR.jpeg" alt="Science fair" loading="lazy" />
                        <figcaption class="photo-masonry__cap">Science fair</figcaption>
                    </figure>
                    <figure>
                        <img src="assets/images/CULTURAL EVENT.jpg" alt="Cultural event" loading="lazy" />
                        <figcaption class="photo-masonry__cap">Cultural evening</figcaption>
                    </figure>
                    <figure>
                        <img src="assets/images/GRADUATION.jpeg" alt="Graduation" loading="lazy" />
                        <figcaption class="photo-masonry__cap">Graduation</figcaption>
                    </figure>
                </div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <button id="backToTop" class="btn back-to-top" type="button" aria-label="Back to top">
        <i class="bi bi-arrow-up"></i>
    </button>

    <a href="https://wa.me/919439249229" class="whatsapp-float" target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp">
        <i class="bi bi-whatsapp"></i>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/load-components.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
